<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GROUP | ADDON</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { transition: all 0.3s ease; min-height: 100vh; display: flex; flex-direction: column; }
        .dark-theme { background-color: #050505; color: #fafafa; }
        .light-theme { background-color: #f4f4f5; color: #18181b; }
        
        .page-content { display: none; }
        .active-page { display: block; animation: fadeIn 0.4s ease-out; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body id="bodyTag" class="dark-theme font-sans">

    <nav class="p-6">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="font-black tracking-tighter text-xl underline decoration-purple-600">
                GROUP
            </div>
            
            <div class="flex items-center gap-8">
                <div class="flex gap-6 text-xs uppercase font-bold tracking-widest">
                    <button onclick="showPage('home')" class="hover:text-purple-500 transition">HOME</button>
                    <button onclick="showPage('modules')" class="hover:text-purple-500 transition">MODULES</button>
                    <button onclick="showPage('media')" class="hover:text-purple-500 transition">MEDIA</button>
                </div>
                <button onclick="toggleTheme()" class="border border-zinc-700 px-3 py-1 rounded-full text-[10px] uppercase font-bold hover:bg-white hover:text-black transition">SWITCH MODE</button>
            </div>
        </div>
    </nav>

    <main class="flex-grow flex flex-col justify-center items-center px-4">
        
        <section id="home" class="page-content active-page text-center">
            <h1 class="text-6xl md:text-8xl font-black mb-4 tracking-tighter uppercase italic">
                built for <span class="text-purple-600">GROUP</span>
            </h1>
            
            <div class="mt-8 flex justify-center">
                <img id="logo" src="img/addon.png" alt="Addon Logo" class="max-w-[400px] w-full h-auto drop-shadow-[0_0_35px_rgba(168,85,247,0.3)]">
            </div>
            
            <p class="mt-8 text-zinc-500 font-mono text-sm tracking-widest uppercase">
                // for GROUP closed source
            </p>
        </section>

        <section id="modules" class="page-content max-w-6xl w-full py-10">
            <h2 class="text-4xl font-black mb-10 italic">MODULES</h2>
            <div class="grid md:grid-cols-2 gap-6">
                <div class="bg-zinc-900/50 p-4 border border-zinc-800 rounded-2xl">
                    <img src="img/combat-ss.png" class="rounded-xl border border-zinc-700 mb-4">
                    <h3 class="text-xl font-bold">COMBAT</h3>
                </div>
                <div class="bg-zinc-900/50 p-4 border border-zinc-800 rounded-2xl">
                    <img src="img/movement-ss.png" class="rounded-xl border border-zinc-700 mb-4">
                    <h3 class="text-xl font-bold">HUD</h3>
                </div>
            </div>
        </section>

        <section id="media" class="page-content max-w-6xl w-full py-10">
            <h2 class="text-4xl font-black mb-10 italic text-right">MEDIA</h2>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <img src="img/media1.jpg" class="rounded border border-zinc-800">
                <img src="img/media2.jpg" class="rounded border border-zinc-800">
                <img src="img/media3.jpg" class="rounded border border-zinc-800">
                <img src="img/media4.jpg" class="rounded border border-zinc-800">
            </div>
        </section>

    </main>

    <footer class="p-10 text-[10px] text-zinc-600 font-mono text-center uppercase tracking-[0.3em]">
        GROUP
    </footer>

    <script>
        function showPage(pageId) {
            const pages = document.querySelectorAll('.page-content');
            pages.forEach(page => page.classList.remove('active-page'));
            
            document.getElementById(pageId).classList.add('active-page');
        }

        // theme toggle
        function toggleTheme() {
            const body = document.getElementById('bodyTag');
            const logo = document.getElementById('logo');
            
            if (body.classList.contains('dark-theme')) {
                body.classList.replace('dark-theme', 'light-theme');
                logo.src = 'img/addon-light.png';
            } else {
                body.classList.replace('light-theme', 'dark-theme');
                logo.src = 'img/addon.png';
            }
        }
    </script>
</body>
</html>
